<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleep Outside | Checkout</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <header class="divider" id="main-header"></header>

  <main class="divider">
    <section class="products">
      <h2>Review & Place your Order</h2>

      <form id="checkout-form" name="checkout">
        <fieldset>
          <legend>Shipping Address</legend>
          <label for="fname">First Name</label>
          <input type="text" name="fname" id="fname" required />
      
          <label for="lname">Last Name</label>
          <input type="text" name="lname" id="lname" required />
      
          <label for="street">Street</label>
          <input type="text" name="street" id="street" required />
      
          <label for="city">City</label>
          <input type="text" name="city" id="city" required />
      
          <label for="state">State</label>
          <input type="text" name="state" id="state" required />
      
          <label for="zip">Zip Code</label>
          <input type="text" name="zip" id="zip" required pattern="\d{5,}"
            title="Enter a valid ZIP code (e.g., 83440)" />
        </fieldset>
      
        <fieldset>
          <legend>Payment</legend>
          <label for="cardNumber">Card Number</label>
          <input type="text" name="cardNumber" id="cardNumber" required minlength="16" maxlength="16"
            placeholder="1234123412341234" pattern="\d{16}" title="It must be exactly 16 digits long" />
      
          <label for="expiration">Expiration Date</label>
          <input type="text" name="expiration" id="expiration" required placeholder="MM/YY" pattern="\d{2}/\d{2}"
            title="Use the Month/Year format (e.g., 08/26)" />
      
          <label for="code">Security Code</label>
          <input type="text" name="code" id="code" required minlength="3" maxlength="3" pattern="\d{3}"
            title="Enter the 3-digit code (e.g., 123)" />
        </fieldset>
      
        <fieldset id="order-summary">
          <legend>Order Summary</legend>
          <ul>
            <li>
              <label>Item Subtotal</label>
              <p id="subtotal">$0.00</p>
            </li>
            <li>
              <label>Shipping Estimate</label>
              <p id="shipping">$0.00</p>
            </li>
            <li>
              <label>Tax</label>
              <p id="tax">$0.00</p>
            </li>
            <li>
              <label><strong>Order Total</strong></label>
              <p id="order-total">$0.00</p>
            </li>
          </ul>
        </fieldset>
      
        <button type="submit" id="checkout-button">Checkout</button>
      </form>
    </section>
  </main>

  <footer id="main-footer"></footer>

  <script src="/js/checkout.js" type="module"></script>
</body>

</html>
